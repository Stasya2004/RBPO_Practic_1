name: Java CI with Maven

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openjdk:22-ea-jdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java version
        run: java -version

      - name: Make mvnw executable
        if: hashFiles('mvnw') != ''
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        id: semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          output: semgrep.sarif
          output_format: sarif

      - name: Debug (проверяем, создался ли файл)
        run: |
          ls -la semgrep.sarif || echo "Файл не найден"
          cat semgrep.sarif | head -n 5 || echo "Не удалось прочитать"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif