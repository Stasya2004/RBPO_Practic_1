name: Java CI with Maven

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openjdk:22-ea-jdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java version
        run: java -version

      - name: Make mvnw executable
        if: hashFiles('mvnw') != ''
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep and generate SARIF
        run: |
          semgrep --version
          semgrep ci --config auto --sarif --output semgrep.sarif . || echo "Semgrep found issues, continuing..."
          ls -la semgrep.sarif || echo "File not found after run"

      - name: If file missing, create dummy SARIF (for debugging)
        if: failure()
        run: |
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > semgrep.sarif

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
