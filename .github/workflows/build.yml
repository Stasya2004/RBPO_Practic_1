name: Java CI with Maven and SAST

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openjdk:22-ea-jdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java version
        run: java -version

      - name: Make mvnw executable
        if: hashFiles('mvnw') != ''
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List files
        run: |
          echo "=== Root directory contents ==="
          ls -la
          echo "=== Source code directory (if exists) ==="
          ls -la src/ || echo "src/ directory not found"

      - name: Install Semgrep and run scan
        id: semgrep_scan
        run: |
          pip install semgrep
          mkdir -p test-results
          semgrep scan --config auto --sarif --output test-results/semgrep.sarif . || true
          echo "SARIF created at test-results/semgrep.sarif"

      - name: Verify or create SARIF file
        run: |
          if [ -f test-results/semgrep.sarif ]; then
            echo ")))SARIF file found. File size: $(wc -c < test-results/semgrep.sarif) bytes"
            head -n 5 test-results/semgrep.sarif || true
          else
            echo "!!!SARIF file not found. Creating placeholder file to avoid upload error."
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > test-results/semgrep.sarif
          fi
          cp test-results/semgrep.sarif ./semgrep.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep